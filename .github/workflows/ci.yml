name: CI

# Pushes: default branch only. PRs: any branch. Manual: Actions tab → CI → Run workflow.
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Pre-commit (ruff + ruff format)
        run: uv run pre-commit run --all-files

      - name: Pytest with coverage
        run: >-
          uv run pytest
          --cov=manifold
          --cov-report=term-missing
          --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
