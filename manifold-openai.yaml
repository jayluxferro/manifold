# Manifold pipeline configuration — OpenAI-compatible mode
#
# Use this when agents speak the OpenAI API (Cursor, Codex CLI, etc.):
#   export OPENAI_API_BASE=http://127.0.0.1:9000/v1
#
# The same services handle both /v1/chat/completions (OpenAI) and
# /v1/messages (Anthropic), so this config works for either surface.
# The only difference from the default config is the fallback_upstream
# which targets the OpenAI API instead of Anthropic.
#
# Start with:  manifold up -c manifold-openai.yaml

gateway:
  host: 127.0.0.1
  port: 9000
  fallback_upstream: https://api.openai.com/v1

pipeline:
  # Privacy: scrub PII/secrets before cloud, restore in responses
  - name: llm-redactor
    directory: /Users/jay/dev/ml/mcp/llm-redactor
    command: "uv run llm-redactor serve --config examples/local-only.yaml --port {port}"
    port: 7789
    health: /v1/redactor/config
    stats: /v1/redactor/stats
    config_file: examples/local-only.yaml
    upstream_key: cloud_target.endpoint
    upstream_via: config_file
    upstream_path: /v1
    enabled: true

  # Optimization: route trivial requests locally, compress context, cache
  - name: local-splitter
    directory: /Users/jay/dev/ml/mcp/local-splitter
    command: "uv run local-splitter serve-http --config config.yaml --port {port}"
    port: 7788
    health: /healthz
    stats: /v1/splitter/stats
    config_file: config.yaml
    upstream_key: models.cloud.endpoint
    upstream_via: config_file
    enabled: true

  # Scheduling: admission control, rate limiting, backpressure, budgets
  - name: hivemind
    directory: /Users/jay/dev/ml/mcp/hivemind
    command: "uv run hivemind proxy --port {port} --upstream {upstream}"
    port: 8765
    health: /_health
    stats: /_stats
    upstream_via: cli_arg
    enabled: true
